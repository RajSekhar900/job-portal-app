<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Job Portal</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<h1>Job Listings</h1>

<form action="/search" method="get">
    <input type="text" name="keyword" placeholder="Search by title or company">
    <button type="submit">Search</button>
</form>

<br>

<a href="/add">Add New Job</a>

<table>
    <tr>
        <th>Title</th>
        <th>Company</th>
        <th>Location</th>
        <th>Description</th>
        <th>Action</th>
        <th>Edit</th>
    </tr>

    <tr th:each="job : ${jobs}">
        <td th:text="${job.title}"></td>
        <td th:text="${job.company}"></td>
        <td th:text="${job.location}"></td>
        <td th:text="${job.description}"></td>

        <td>
            <a th:href="@{/delete/{id}(id=${job.id})}">Delete</a>
        </td>

        <td>
            <a th:href="@{/edit/{id}(id=${job.id})}">Edit</a>
        </td>
    </tr>
</table>

</body>
</html>
